<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live People Counter (Face Boxes)</title>

  <!-- Face API (UMD global: window.faceapi) -->
  <script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b1020;
      color: #e8eefc;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 26px 18px 40px; }
    h1 { margin: 0 0 6px; font-size: 42px; }
    .sub { margin: 0 0 16px; opacity: .8; }
    .grid { display: grid; grid-template-columns: 1.2fr .8fr; gap: 16px; }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,.35);
    }
    .videoWrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
    }
    video, canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
    button {
      border: 0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      background: #2d6cdf;
      color: white;
    }
    button.secondary { background: rgba(255,255,255,.12); }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .pill {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      font-weight: 600;
    }
    .pill.ok { border-color: rgba(66, 255, 164, .35); background: rgba(66,255,164,.12); }
    .pill.bad { border-color: rgba(255, 92, 92, .35); background: rgba(255,92,92,.12); }
    .bigCount { font-size: 84px; font-weight: 800; line-height: 1; margin: 6px 0 0; }
    .label { opacity: .75; letter-spacing: .12em; font-size: 12px; text-transform: uppercase; }
    #logs {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 12px;
      max-height: 280px;
      overflow: auto;
      padding: 12px;
      border-radius: 12px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .muted { opacity: .8; font-size: 13px; margin-top: 6px; }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Live People Counter</h1>
    <p class="sub">Webcam + face boxes + logs to Airtable via <code>/api/log</code>.</p>

    <div class="grid">
      <div class="card">
        <div class="videoWrap">
          <video id="video" autoplay playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>

        <div class="row" style="margin-top:14px;">
          <div>
            <div class="label">Faces Detected</div>
            <div id="count" class="bigCount">0</div>
          </div>
          <div style="flex:1"></div>
          <div id="pillCamera" class="pill bad">Camera: idle</div>
          <div id="pillAirtable" class="pill bad">Airtable: unknown</div>
        </div>

        <div class="row">
          <button id="btnStart">Start Camera</button>
          <button id="btnStop" class="secondary" disabled>Stop</button>
          <button id="btnValidate" class="secondary">Validate (send 9999)</button>
        </div>

        <div class="muted">Sends an update every <b>5 seconds</b> when the count changes.</div>
      </div>

      <div class="card">
        <div class="label">Date &amp; Time</div>
        <div id="dt" style="font-size:34px; font-weight:800; margin:6px 0 10px;">—</div>
        <div class="muted">Local browser time.</div>

        <div style="height:12px"></div>
        <div class="label">Errors / Logs</div>
        <div id="logs"></div>
      </div>
    </div>
  </div>

  <script>
    // ---------- Logging ----------
    const logsEl = document.getElementById("logs");
    const log = (msg, type="info") => {
      const ts = new Date().toISOString();
      const icon = type === "err" ? "✖" : type === "ok" ? "✔" : "i";
      logsEl.textContent = `[${ts}] ${icon} ${msg}\n` + logsEl.textContent;
    };
    window.addEventListener("error", (e) => log(`PAGE ERROR: ${e.message}`, "err"));
    window.addEventListener("unhandledrejection", (e) => log(`PROMISE ERROR: ${String(e.reason)}`, "err"));

    // ---------- UI ----------
    const video = document.getElementById("video");
    const canvas = document.getElementById("overlay");
    const ctx = canvas.getContext("2d");
    const countEl = document.getElementById("count");
    const dtEl = document.getElementById("dt");
    const pillCamera = document.getElementById("pillCamera");
    const pillAirtable = document.getElementById("pillAirtable");
    const btnStart = document.getElementById("btnStart");
    const btnStop = document.getElementById("btnStop");
    const btnValidate = document.getElementById("btnValidate");

    const setPill = (el, ok, text) => {
      el.classList.remove("ok","bad");
      el.classList.add(ok ? "ok" : "bad");
      el.textContent = text;
    };

    // ---------- Clock ----------
    const tick = () => (dtEl.textContent = new Date().toLocaleString());
    tick(); setInterval(tick, 1000);

    // ---------- Airtable via /api/log ----------
    async function postToAirtable(peopleCount) {
      const resp = await fetch("/api/log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          people_count: peopleCount,
          timestamp: new Date().toISOString()
        })
      });
      const text = await resp.text();
      if (!resp.ok) throw new Error(`Airtable log failed (${resp.status}): ${text}`);
      return text;
    }

    async function validateConnections() {
      try {
        log("Validating: writing people_count=9999 to Airtable...");
        await postToAirtable(9999);
        setPill(pillAirtable, true, "Airtable: ok");
        log("Validate OK: wrote 9999 to Airtable.", "ok");
      } catch (e) {
        setPill(pillAirtable, false, "Airtable: error");
        log(String(e), "err");
      }
    }

    // ---------- Face detection loop ----------
    let stream = null;
    let running = false;
    let latestCount = 0;
    let lastSent = null;
    let loopHandle = null;

    function resizeCanvasToVideo() {
      const w = video.videoWidth || 1280;
      const h = video.videoHeight || 720;
      if (canvas.width !== w) canvas.width = w;
      if (canvas.height !== h) canvas.height = h;
    }

    async function loadModels() {
      // We load the tiny face detector model from a CDN-hosted model pack.
      // This is the simplest “no files in repo” approach.
      const MODEL_URL = "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights";
      log("Loading face detector model...");
      await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
      log("Model loaded.", "ok");
    }

    async function startCamera() {
      try {
        if (running) return;

        btnStart.disabled = true;
        setPill(pillCamera, false, "Camera: starting...");
        log("Starting camera...");

        // Wait until faceapi is available (script is defer)
        if (!window.faceapi) throw new Error("face-api.js did not load.");

        await loadModels();

        stream = await navigator.mediaDevices.getUserMedia({
          video: { width: 1280, height: 720 },
          audio: false
        });
        video.srcObject = stream;

        await new Promise((resolve) => {
          video.onloadedmetadata = () => resolve();
        });

        running = true;
        btnStop.disabled = false;
        setPill(pillCamera, true, "Camera: ok");
        log("Camera started.", "ok");

        // start detection loop
        detectLoop();
      } catch (e) {
        running = false;
        btnStart.disabled = false;
        btnStop.disabled = true;
        setPill(pillCamera, false, "Camera: error");
        log(`Camera start error: ${String(e)}`, "err");
      }
    }

    function stopCamera() {
      try {
        running = false;
        if (loopHandle) cancelAnimationFrame(loopHandle);
        loopHandle = null;

        if (stream) stream.getTracks().forEach(t => t.stop());
        stream = null;
        video.srcObject = null;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        latestCount = 0;
        countEl.textContent = "0";

        btnStart.disabled = false;
        btnStop.disabled = true;
        setPill(pillCamera, false, "Camera: stopped");
        log("Camera stopped.");
      } catch (e) {
        log(`Stop error: ${String(e)}`, "err");
      }
    }

    async function detectLoop() {
      if (!running) return;

      try {
        resizeCanvasToVideo();
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const options = new faceapi.TinyFaceDetectorOptions({ inputSize: 416, scoreThreshold: 0.5 });
        const detections = await faceapi.detectAllFaces(video, options);

        latestCount = detections.length;
        countEl.textContent = String(latestCount);

        // Draw boxes
        ctx.lineWidth = 3;
        ctx.strokeStyle = "#2cff9a";
        ctx.fillStyle = "#2cff9a";
        ctx.font = "18px Arial";

        detections.forEach((d, i) => {
          const b = d.box;
          ctx.strokeRect(b.x, b.y, b.width, b.height);
          ctx.fillText(`Face ${i+1}`, b.x + 6, Math.max(18, b.y - 6));
        });

      } catch (e) {
        setPill(pillCamera, false, "Camera: error");
        log(`Detect loop error: ${String(e)}`, "err");
      }

      loopHandle = requestAnimationFrame(detectLoop);
    }

    // ---------- periodic send to Airtable ----------
    async function maybeSendCount() {
      if (!running) return;
      if (lastSent === latestCount) return;

      try {
        await postToAirtable(latestCount);
        setPill(pillAirtable, true, "Airtable: ok");
        log(`Logged to Airtable: people_count=${latestCount}`, "ok");
        lastSent = latestCount;
      } catch (e) {
        setPill(pillAirtable, false, "Airtable: error");
        log(String(e), "err");
      }
    }
    setInterval(maybeSendCount, 5000);

    // ---------- bind ----------
    btnStart.addEventListener("click", startCamera);
    btnStop.addEventListener("click", stopCamera);
    btnValidate.addEventListener("click", validateConnections);

    log("Page loaded. Click 'Start Camera' to begin.");
  </script>
</body>
</html>
