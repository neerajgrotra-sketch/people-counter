<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Live People Counter</title>
  <style>
    body { font-family: Arial, sans-serif; text-align:center; margin: 40px 16px; }
    #count { font-size: 96px; margin: 10px 0 0; }
    #status { margin-top: 14px; font-size: 14px; opacity: 0.85; white-space: pre-line; }
    .pill { display:inline-block; padding: 8px 12px; border-radius: 999px; border: 1px solid #ddd; }
  </style>
</head>
<body>

  <h1>Live People Count</h1>
  <div id="count">0</div>
  <div id="status" class="pill">Initializing…</div>

  <script type="module">
    import { RealtimeVision } from "https://cdn.jsdelivr.net/npm/overshoot";

    const countEl = document.getElementById("count");
    const statusEl = document.getElementById("status");

    let latestCount = 0;
    let lastSent = null;
    let lastModelUpdateAt = null;

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function safeParseInt(val) {
      const n = parseInt(String(val).trim(), 10);
      return Number.isFinite(n) ? n : null;
    }

    async function getConfig() {
      const res = await fetch("/api/config", { cache: "no-store" });
      if (!res.ok) throw new Error(`Config fetch failed: ${res.status}`);
      const cfg = await res.json();
      if (!cfg?.overshootKey) throw new Error("Missing overshootKey from /api/config");
      return cfg;
    }

    async function sendToAirtable(count) {
      const res = await fetch("/api/log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          people_count: count,
          timestamp: new Date().toISOString()
        })
      });

      if (!res.ok) {
        const text = await res.text();
        throw new Error(`Log failed (${res.status}): ${text}`);
      }
    }

    try {
      setStatus("Loading config…");
      const cfg = await getConfig();

      setStatus("Requesting camera permission…");

      const vision = new RealtimeVision({
        apiKey: cfg.overshootKey,
        source: { type: "camera" },
        prompt: "Return ONLY an integer: the number of people visible in the frame.",
        onResult: (result) => {
          if (!result?.ok) return;

          const num = safeParseInt(result.result);
          if (num === null) return;

          latestCount = num;
          lastModelUpdateAt = new Date();

          countEl.innerText = String(num);
          setStatus(
            `Streaming… last model update: ${lastModelUpdateAt.toLocaleTimeString()}\n` +
            `Latest count: ${latestCount}\n` +
            `Last sent: ${lastSent === null ? "never" : lastSent}`
          );
        }
      });

      await vision.start();
      setStatus("Streaming… (waiting for first model result)");

      // Send every 5 seconds only when value changes
      setInterval(async () => {
        try {
          if (latestCount !== lastSent) {
            await sendToAirtable(latestCount);
            lastSent = latestCount;

            setStatus(
              `Streaming… last model update: ${lastModelUpdateAt ? lastModelUpdateAt.toLocaleTimeString() : "n/a"}\n` +
              `Latest count: ${latestCount}\n` +
              `Last sent: ${lastSent} @ ${new Date().toLocaleTimeString()}`
            );
          }
        } catch (err) {
          setStatus(`Error sending to Airtable:\n${err?.message || err}`);
        }
      }, 5000);

    } catch (err) {
      setStatus(`Startup error:\n${err?.message || err}`);
    }
  </script>

</body>
</html>
