<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Live People Counter</title>
  <style>
    body { font-family: Arial; text-align:center; margin-top:50px; }
    #count { font-size:100px; }
    #status { margin-top: 10px; opacity: 0.8; }
  </style>
</head>
<body>
  <h1>Live People Count</h1>
  <div id="count">0</div>
  <div id="status">Initializing…</div>

  <script type="module">
    const statusEl = document.getElementById("status");
    const countEl = document.getElementById("count");

    function setStatus(msg) { statusEl.textContent = msg; }

    // 1) Get Overshoot key from server (keeps it out of GitHub)
    const cfg = await fetch("/api/config").then(r => r.json());
    const overshootKey = cfg.overshootKey;
    if (!overshootKey) throw new Error("Missing overshootKey from /api/config");

    // 2) Load Overshoot SDK from CDN and inspect exports
    import * as Overshoot from "https://cdn.jsdelivr.net/npm/overshoot/dist/index.js";
    console.log("Overshoot exports:", Overshoot);

    // 3) Pick the correct constructor from the SDK exports
    const RealtimeVision =
      Overshoot.RealtimeVision ||
      Overshoot.default ||
      Overshoot.Vision ||
      Overshoot.RealtimeVisionClient;

    if (!RealtimeVision) {
      setStatus("Overshoot SDK loaded, but RealtimeVision not found. Check console exports.");
      throw new Error("Could not find RealtimeVision constructor in Overshoot exports.");
    }

    let latestCount = 0;
    let lastSent = -1;

    async function sendToAirtable(count) {
      await fetch("/api/log", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          people_count: count,
          timestamp: new Date().toISOString()
        })
      });
    }

    // 4) Start webcam vision
    setStatus("Requesting camera permission…");

    const vision = new RealtimeVision({
      apiKey: overshootKey,
      source: { type: "camera" },
      prompt: "Return ONLY an integer: the number of people visible in the frame.",
      onResult: (result) => {
        if (!result?.ok) return;

        const num = parseInt(String(result.result || "").trim(), 10);
        if (!Number.isFinite(num)) return;

        latestCount = num;
        countEl.textContent = String(num);
        setStatus("Streaming…");
      }
    });

    await vision.start();

    // 5) Send count changes to Airtable every 5 seconds
    setInterval(() => {
      if (latestCount !== lastSent) {
        sendToAirtable(latestCount).catch(err => console.error("Airtable log error:", err));
        lastSent = latestCount;
      }
    }, 5000);

  </script>
</body>
</html>
