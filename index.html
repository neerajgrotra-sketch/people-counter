<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Live People Counter (Face Boxes)</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:#111a2e;
      --muted:#9fb0d0;
      --text:#eaf0ff;
      --good:#2ecc71;
      --bad:#ff5b5b;
      --warn:#ffcc00;
      --accent:#3b82f6;
      --line:#223055;
    }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 20% 0%, #142247 0%, var(--bg) 55%);
      color:var(--text);
    }
    .wrap{ max-width:1100px; margin:32px auto; padding:0 16px; }
    h1{ margin:0 0 6px 0; font-size:40px; letter-spacing:.2px; }
    .sub{ color:var(--muted); margin:0 0 20px 0; }
    .grid{ display:grid; grid-template-columns: 2fr 1fr; gap:16px; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:16px;
      box-shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    .row{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding:8px 10px; border-radius:999px;
      background: rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      color:var(--muted);
      font-size:13px;
    }
    .pill.good{ color:#d9ffe8; border-color: rgba(46,204,113,.35); background: rgba(46,204,113,.12); }
    .pill.bad{ color:#ffe2e2; border-color: rgba(255,91,91,.35); background: rgba(255,91,91,.12); }
    .btn{
      appearance:none; border:0; cursor:pointer;
      padding:10px 14px; border-radius:12px;
      background: rgba(255,255,255,.10);
      color:var(--text);
      border:1px solid rgba(255,255,255,.12);
      font-weight:600;
    }
    .btn.primary{ background: var(--accent); border-color: rgba(59,130,246,.6); }
    .btn:disabled{ opacity:.55; cursor:not-allowed; }
    .kpi{ font-size:64px; font-weight:800; line-height:1; margin:10px 0 6px 0; }
    .label{ font-size:13px; color:var(--muted); letter-spacing:.12em; text-transform:uppercase; }
    .videoWrap{
      position:relative; width:100%;
      border-radius:16px; overflow:hidden;
      border:1px solid rgba(255,255,255,.10);
      background: #000;
    }
    video{ width:100%; height:auto; display:block; }
    canvas{ position:absolute; inset:0; width:100%; height:100%; pointer-events:none; }
    .logs{
      margin-top:16px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:13px;
      white-space: pre-wrap;
      background: rgba(0,0,0,.35);
      border:1px solid rgba(255,255,255,.08);
      border-radius:14px;
      padding:12px;
      max-height:260px;
      overflow:auto;
    }
    .small{ font-size:12px; color:var(--muted); }
    @media (max-width: 900px){
      .grid{ grid-template-columns: 1fr; }
      .kpi{ font-size:56px; }
    }
  </style>

  <!-- MediaPipe Face Detection -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
</head>

<body>
  <div class="wrap">
    <h1>Live People Counter</h1>
    <p class="sub">Webcam → Face detection boxes → logs count to Airtable via <code>/api/log</code></p>

    <div class="grid">
      <div class="card">
        <div class="label">Camera Preview</div>
        <div class="videoWrap" style="margin-top:10px;">
          <video id="video" playsinline muted></video>
          <canvas id="overlay"></canvas>
        </div>

        <div class="row" style="margin-top:12px;">
          <button class="btn primary" id="btnStart">Start Camera</button>
          <button class="btn" id="btnStop" disabled>Stop</button>
          <button class="btn" id="btnValidate">Validate (send 9999)</button>

          <span class="pill" id="pillCamera">Camera: idle</span>
          <span class="pill" id="pillAirtable">Airtable: idle</span>
        </div>

        <div class="small" style="margin-top:10px;">
          Sends an update every <b>5 seconds</b> when the count changes.
        </div>
      </div>

      <div class="card">
        <div class="label">People Count (faces)</div>
        <div class="kpi" id="count">0</div>

        <div style="height:10px;"></div>
        <div class="label">Date & Time</div>
        <div style="font-size:26px; font-weight:700; margin-top:8px;" id="dt">—</div>
        <div class="small">Local browser time.</div>
      </div>
    </div>

    <div class="card" style="margin-top:16px;">
      <div class="label">Errors / Logs</div>
      <div class="logs" id="logs"></div>
    </div>
  </div>

<script>
(() => {
  const video = document.getElementById("video");
  const canvas = document.getElementById("overlay");
  const ctx = canvas.getContext("2d");

  const elCount = document.getElementById("count");
  const elDT = document.getElementById("dt");
  const logsEl = document.getElementById("logs");

  const btnStart = document.getElementById("btnStart");
  const btnStop = document.getElementById("btnStop");
  const btnValidate = document.getElementById("btnValidate");

  const pillCamera = document.getElementById("pillCamera");
  const pillAirtable = document.getElementById("pillAirtable");

  let camera = null;
  let latestCount = 0;
  let lastSent = -1;
  let running = false;

  function log(msg, level="info"){
    const ts = new Date().toISOString();
    const icon = level === "error" ? "✖" : level === "warn" ? "⚠" : "i";
    logsEl.textContent = `[${ts}] ${icon} ${msg}\n` + logsEl.textContent;
  }

  function setPill(pill, text, state){
    pill.textContent = text;
    pill.classList.remove("good","bad");
    if(state === "good") pill.classList.add("good");
    if(state === "bad") pill.classList.add("bad");
  }

  function fitCanvasToVideo(){
    // Make canvas pixel size match the displayed video size
    const rect = video.getBoundingClientRect();
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(rect.width * dpr);
    canvas.height = Math.round(rect.height * dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }

  function drawBoxes(detections){
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const vw = video.videoWidth;
    const vh = video.videoHeight;
    if(!vw || !vh) return;

    // canvas is styled to match video element; use element rect for mapping
    const rect = video.getBoundingClientRect();
    const cw = rect.width;
    const ch = rect.height;

    ctx.lineWidth = 3;
    ctx.strokeStyle = "#22c55e";
    ctx.font = "14px ui-monospace, Menlo, Consolas, monospace";
    ctx.fillStyle = "#22c55e";

    for (let i=0; i<detections.length; i++){
      // MediaPipe gives relative bbox in [0..1]
      const b = detections[i].boundingBox;
      const x = b.xCenter - b.width/2;
      const y = b.yCenter - b.height/2;

      const px = x * cw;
      const py = y * ch;
      const pw = b.width * cw;
      const ph = b.height * ch;

      ctx.strokeRect(px, py, pw, ph);
      ctx.fillText("Face", px + 4, Math.max(14, py - 6));
    }
  }

  async function sendToAirtable(count){
    try{
      setPill(pillAirtable, "Airtable: sending...", "warn");
      const r = await fetch("/api/log", {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({
          people_count: count,
          timestamp: new Date().toISOString()
        })
      });

      const text = await r.text();
      if(!r.ok){
        setPill(pillAirtable, `Airtable: ${r.status}`, "bad");
        log(`Airtable POST failed (${r.status}): ${text}`, "error");
        return false;
      }
      setPill(pillAirtable, "Airtable: ok", "good");
      log(`Logged to Airtable: people_count=${count}`);
      return true;
    } catch(e){
      setPill(pillAirtable, "Airtable: error", "bad");
      log(`Airtable exception: ${e?.message || e}`, "error");
      return false;
    }
  }

  // Live clock
  setInterval(() => {
    elDT.textContent = new Date().toLocaleString();
  }, 250);

  // MediaPipe Face Detection setup
  const faceDetection = new FaceDetection.FaceDetection({
    locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
  });
  faceDetection.setOptions({
    model: "short",          // "short" is faster, good for real-time
    minDetectionConfidence: 0.5
  });

  faceDetection.onResults((results) => {
    if(!running) return;

    const detections = results?.detections || [];
    latestCount = detections.length;
    elCount.textContent = String(latestCount);

    drawBoxes(detections);
  });

  async function startCamera(){
    try{
      setPill(pillCamera, "Camera: starting...", "warn");
      log("Starting camera...");

      // Stop any previous camera
      await stopCamera();

      // MediaPipe Camera helper (handles getUserMedia + frame loop)
      camera = new Camera(video, {
        onFrame: async () => {
          if(!running) return;
          // keep canvas synced
          if(video.readyState >= 2) fitCanvasToVideo();
          await faceDetection.send({ image: video });
        },
        width: 1280,
        height: 720
      });

      running = true;
      await camera.start();

      setPill(pillCamera, "Camera: running", "good");
      btnStart.disabled = true;
      btnStop.disabled = false;

      log("Camera started. Face detection running.");
    } catch(e){
      running = false;
      setPill(pillCamera, "Camera: error", "bad");
      btnStart.disabled = false;
      btnStop.disabled = true;
      log(`Camera error: ${e?.message || e}`, "error");
    }
  }

  async function stopCamera(){
    try{
      running = false;

      if(camera){
        await camera.stop();
        camera = null;
      }

      // Hard-stop the tracks if they exist
      const stream = video.srcObject;
      if(stream && stream.getTracks){
        stream.getTracks().forEach(t => t.stop());
      }
      video.srcObject = null;

      ctx.clearRect(0,0,canvas.width,canvas.height);

      setPill(pillCamera, "Camera: stopped", "warn");
      btnStart.disabled = false;
      btnStop.disabled = true;

      log("Camera stopped.");
    } catch(e){
      log(`Stop camera exception: ${e?.message || e}`, "warn");
    }
  }

  // Log every 5s if changed
  setInterval(() => {
    if(!running) return;
    if(latestCount !== lastSent){
      sendToAirtable(latestCount);
      lastSent = latestCount;
    }
  }, 5000);

  // Validate button (send 9999)
  btnValidate.addEventListener("click", async () => {
    log("Validating Airtable connection by sending 9999...");
    await sendToAirtable(9999);
  });

  btnStart.addEventListener("click", startCamera);
  btnStop.addEventListener("click", stopCamera);

  // Resize handling
  window.addEventListener("resize", () => {
    if(video.readyState >= 2) fitCanvasToVideo();
  });

  // Initial
  elDT.textContent = new Date().toLocaleString();
  setPill(pillCamera, "Camera: idle", "warn");
  setPill(pillAirtable, "Airtable: idle", "warn");
  log("Page loaded. Click 'Start Camera' to begin.");
})();
</script>
</body>
</html>
