<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Live People Counter</title>
  <style>
    :root{
      --bg:#0b1220; --card:#101a2e; --muted:#9fb0c8; --text:#e8f0ff;
      --ok:#2ecc71; --warn:#f1c40f; --err:#e74c3c; --btn:#2d6cdf;
    }
    body{
      margin:0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(1200px 700px at 10% -10%, #182a52 0%, rgba(24,42,82,0) 60%),
                  radial-gradient(900px 600px at 90% 0%, #1a3b6b 0%, rgba(26,59,107,0) 55%),
                  var(--bg);
      color:var(--text);
      padding: 28px;
    }
    h1{ margin:0 0 8px; font-size: 40px; letter-spacing: -0.02em;}
    .sub{ color:var(--muted); margin-bottom:18px; }
    .grid{ display:grid; grid-template-columns: 1.2fr 1fr; gap:16px; align-items:start; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.35);
    }
    .label{ color:var(--muted); font-size: 13px; letter-spacing: .12em; text-transform:uppercase; }
    .big{
      font-size: 86px; font-weight: 750; margin: 10px 0 12px;
      letter-spacing: -0.03em;
    }
    .row{ display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
    button{
      border:0; padding:12px 16px; border-radius: 12px; cursor:pointer;
      font-weight: 650; font-size: 15px;
    }
    .primary{ background: var(--btn); color:white; }
    .secondary{ background: rgba(255,255,255,0.08); color: var(--text); }
    .danger{ background: rgba(231,76,60,0.15); color: #ffb3ad; border: 1px solid rgba(231,76,60,0.35); }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding: 8px 10px; border-radius: 999px; font-size: 13px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--muted);
    }
    .pill.ok{ color:#bff5d6; border-color: rgba(46,204,113,0.4); background: rgba(46,204,113,0.12); }
    .pill.warn{ color:#fff0b3; border-color: rgba(241,196,15,0.4); background: rgba(241,196,15,0.12); }
    .pill.err{ color:#ffc2bd; border-color: rgba(231,76,60,0.45); background: rgba(231,76,60,0.14); }
    .muted{ color: var(--muted); }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .log{
      height: 220px; overflow:auto; background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px; padding: 12px;
      white-space: pre-wrap;
      font-size: 13px;
    }
    .rightCol .bigTime{ font-size: 42px; font-weight: 750; margin: 10px 0 0; }
    .small{ font-size: 13px; }
    a{ color:#a8c7ff; }
    @media (max-width: 960px){
      .grid{ grid-template-columns: 1fr; }
      .big{ font-size: 72px; }
      .rightCol .bigTime{ font-size: 36px; }
    }
  </style>
</head>
<body>
  <h1>Live People Counter</h1>
  <div class="sub">Uses webcam + Overshoot for people counting and logs counts to Airtable via <span class="mono">/api/log</span>.</div>

  <div class="grid">
    <div class="card">
      <div class="label">People Count</div>
      <div id="count" class="big">—</div>

      <div class="row" style="margin-bottom:10px;">
        <button id="startBtn" class="primary">Start Camera</button>
        <button id="stopBtn" class="secondary" disabled>Stop</button>

        <span id="camPill" class="pill warn">Camera: idle</span>
        <span id="airPill" class="pill">Airtable: idle</span>
      </div>

      <div class="row" style="margin-bottom:8px;">
        <button id="testBtn" class="secondary">Validate Connections (send 9999)</button>
        <span id="testPill" class="pill">Not tested</span>
      </div>

      <div class="muted small">
        Sends an update every <b>5 seconds</b> when the count changes.
      </div>
    </div>

    <div class="card rightCol">
      <div class="label">Date &amp; Time</div>
      <div id="clock" class="bigTime">—</div>
      <div class="muted small">Local browser time.</div>

      <div style="height:14px;"></div>

      <div class="label">Debug</div>
      <div id="debug" class="mono small muted">Ready.</div>
    </div>
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="label">Errors / Logs</div>
    <div id="log" class="log mono"></div>
  </div>

  <script type="module">
    // ---- Overshoot import (ESM) ----
    // If you see "does not provide an export named RealtimeVision", tell me your console error and I'll swap this line.
    import { RealtimeVision } from "https://cdn.jsdelivr.net/npm/overshoot@latest/dist/index.mjs";

    // ---- UI Elements ----
    const elCount = document.getElementById("count");
    const elClock = document.getElementById("clock");
    const elDebug = document.getElementById("debug");
    const elLog   = document.getElementById("log");

    const startBtn = document.getElementById("startBtn");
    const stopBtn  = document.getElementById("stopBtn");
    const testBtn  = document.getElementById("testBtn");

    const camPill  = document.getElementById("camPill");
    const airPill  = document.getElementById("airPill");
    const testPill = document.getElementById("testPill");

    function nowISO(){ return new Date().toISOString(); }

    function setPill(pill, state, text){
      pill.className = "pill " + (state || "");
      pill.textContent = text;
    }

    function appendLog(msg, level="info"){
      const ts = new Date().toISOString();
      const prefix = level === "error" ? "✖" : (level === "warn" ? "!" : "i");
      elLog.textContent += `[${ts}] ${prefix} ${msg}\n`;
      elLog.scrollTop = elLog.scrollHeight;
    }

    function setDebug(msg){
      elDebug.textContent = msg;
    }

    // ---- Live Clock ----
    function tickClock(){
      const d = new Date();
      elClock.textContent = d.toLocaleString();
    }
    tickClock();
    setInterval(tickClock, 1000);

    // ---- State ----
    let vision = null;
    let latestCount = null;
    let lastSent = null;
    let sendTimer = null;

    // ---- Config ----
    const MODEL = "Qwen/Qwen3-VL-30B-A3B-Instruct"; // required by Overshoot
    const PROMPT = "Return ONLY an integer: the number of people visible in the frame.";

    // ---- API Calls ----
    async function getOvershootKey(){
      const r = await fetch("/api/config");
      if (!r.ok) throw new Error(`/api/config failed: ${r.status}`);
      const data = await r.json();
      if (!data.overshootKey) throw new Error("Missing overshootKey from /api/config");
      return data.overshootKey;
    }

    async function postToAirtable(count){
      try{
        setPill(airPill, "warn", "Airtable: sending…");
        const r = await fetch("/api/log", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ people_count: count, timestamp: nowISO() })
        });
        const text = await r.text();

        if (!r.ok){
          setPill(airPill, "err", `Airtable: ${r.status}`);
          appendLog(`Airtable /api/log error ${r.status}: ${text}`, "error");
          return false;
        }

        setPill(airPill, "ok", "Airtable: ok");
        appendLog(`Logged to Airtable: people_count=${count}`, "info");
        return true;
      } catch (e){
        setPill(airPill, "err", "Airtable: error");
        appendLog(`Airtable fetch failed: ${e.message}`, "error");
        return false;
      }
    }

    async function validateConnections(){
      testPill.textContent = "Testing…";
      testPill.className = "pill warn";
      appendLog("Validating connections…", "info");

      // 1) Airtable test
      const airtableOk = await postToAirtable(9999);

      // 2) Overshoot “connectivity” test (key fetch + object creation)
      let overshootOk = false;
      try{
        const key = await getOvershootKey();
        overshootOk = Boolean(key);
      } catch (e){
        appendLog(`Overshoot config check failed: ${e.message}`, "error");
        overshootOk = false;
      }

      if (airtableOk && overshootOk){
        testPill.textContent = "OK (sent 9999)";
        testPill.className = "pill ok";
        appendLog("Connections OK: Airtable write + Overshoot key loaded.", "info");
      } else {
        testPill.textContent = "FAILED";
        testPill.className = "pill err";
        appendLog(`Connections FAILED (Airtable=${airtableOk}, OvershootKey=${overshootOk})`, "error");
      }
    }

    // ---- Camera / Vision ----
    async function startCamera(){
      try{
        startBtn.disabled = true;
        stopBtn.disabled = false;

        setPill(camPill, "warn", "Camera: starting…");
        setDebug("Loading Overshoot key…");

        const apiKey = await getOvershootKey();
        appendLog("Loaded Overshoot key from /api/config.", "info");

        setDebug("Starting camera + Overshoot stream…");

        vision = new RealtimeVision({
          apiKey,
          model: MODEL,
          source: { type: "camera" },
          prompt: PROMPT,
          onResult: (result) => {
            try{
              if (!result || !result.ok) return;

              // Result expected: integer as text
              const raw = String(result.result ?? "").trim();
              const num = parseInt(raw, 10);
              if (!Number.isFinite(num)) return;

              latestCount = num;
              elCount.textContent = String(num);
            } catch (e){
              appendLog(`onResult parse error: ${e.message}`, "error");
            }
          },
          onError: (err) => {
            // If SDK provides this callback
            const msg = (err && (err.message || String(err))) || "Unknown Overshoot error";
            setPill(camPill, "err", "Camera: error");
            setDebug(msg);
            appendLog(msg, "error");
          }
        });

        await vision.start();

        setPill(camPill, "ok", "Camera: running");
        setDebug("Stream running.");
        appendLog("Camera stream started.", "info");

        // Send to Airtable every 5s only if count changed
        if (sendTimer) clearInterval(sendTimer);
        sendTimer = setInterval(() => {
          if (latestCount == null) return;
          if (latestCount !== lastSent) {
            postToAirtable(latestCount);
            lastSent = latestCount;
          }
        }, 5000);

      } catch (e){
        startBtn.disabled = false;
        stopBtn.disabled = true;

        setPill(camPill, "err", "Camera: error");
        setDebug(e.message || String(e));
        appendLog(e.message || String(e), "error");
      }
    }

    async function stopCamera(){
      try{
        stopBtn.disabled = true;
        startBtn.disabled = false;

        if (sendTimer){
          clearInterval(sendTimer);
          sendTimer = null;
        }

        if (vision && typeof vision.stop === "function"){
          await vision.stop();
        }
        vision = null;

        setPill(camPill, "warn", "Camera: stopped");
        setDebug("Stopped.");
        appendLog("Camera stream stopped.", "info");
      } catch (e){
        setPill(camPill, "err", "Camera: error");
        setDebug(e.message || String(e));
        appendLog(`Stop error: ${e.message || e}`, "error");
      }
    }

    // ---- Wire buttons ----
    startBtn.addEventListener("click", startCamera);
    stopBtn.addEventListener("click", stopCamera);
    testBtn.addEventListener("click", validateConnections);

    // ---- Initial message ----
    appendLog("Page loaded. Click 'Start Camera' to begin.", "info");
  </script>
</body>
</html>
