<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Audience Engagement Detector</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    background:#111;
    color:white;
}

#videoContainer{
    position:relative;
    width:900px;
    margin:auto;
}

video{
    width:900px;
    border-radius:10px;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

#controls{
    margin-top:20px;
}

button{
    padding:10px 20px;
    font-size:16px;
    margin:5px;
}

#stats{
    margin-top:15px;
    font-size:20px;
}

#error{
    color:#ff6b6b;
    margin-top:10px;
}

#clock{
    margin-top:10px;
    font-size:18px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

</head>

<body>

<h1>Audience Engagement Monitor</h1>

<div id="clock"></div>

<div id="videoContainer">

<video id="video" autoplay muted playsinline></video>
<canvas id="overlay"></canvas>

</div>

<div id="controls">

<button onclick="startCamera()">Start Camera</button>
<button onclick="stopCamera()">Stop Camera</button>

</div>

<div id="stats">

People Detected: <span id="peopleCount">0</span>

</div>

<div id="error"></div>

<script>

let video = document.getElementById("video");
let canvas = document.getElementById("overlay");
let ctx = canvas.getContext("2d");

let detector;
let stream;
let running = false;

async function loadModel(){

    try{

        detector = await cocoSsd.load();
        console.log("Model loaded");

    }catch(err){

        showError("Failed to load detection model");

    }

}

function showError(msg){

    document.getElementById("error").innerText = msg;

}

function updateClock(){

    const now = new Date();
    document.getElementById("clock").innerText =
        now.toLocaleDateString() + " " + now.toLocaleTimeString();

}

setInterval(updateClock,1000);

async function startCamera(){

    try{

        stream = await navigator.mediaDevices.getUserMedia({
            video:true
        });

        video.srcObject = stream;

        await video.play();

        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;

        running = true;

        detectLoop();

    }catch(err){

        showError("Camera error: " + err.message);

    }

}

function stopCamera(){

    running = false;

    if(stream){

        stream.getTracks().forEach(track=>track.stop());

    }

}

async function detectLoop(){

    if(!running) return;

    try{

        const predictions = await detector.detect(video);

        ctx.clearRect(0,0,canvas.width,canvas.height);

        let people = predictions.filter(p=>p.class==="person");

        document.getElementById("peopleCount").innerText = people.length;

        people.forEach(person=>{

            const [x,y,width,height] = person.bbox;

            ctx.strokeStyle = "#00ff88";
            ctx.lineWidth = 2;

            ctx.strokeRect(x,y,width,height);

            ctx.fillStyle = "#00ff88";
            ctx.fillText("Person",x,y>10?y-5:10);

        });

    }catch(err){

        showError("Detection error: " + err.message);

    }

    setTimeout(detectLoop,2000);

}

loadModel();

</script>

</body>
</html>
