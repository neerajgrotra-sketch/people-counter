<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>People Tracker</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.18.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body{
background:#0f1730;
color:white;
font-family:Arial;
margin:20px;
}

video,canvas{
border-radius:10px;
}

#container{
position:relative;
width:900px;
}

canvas{
position:absolute;
top:0;
left:0;
}

button{
padding:10px 18px;
margin-right:10px;
border-radius:8px;
border:none;
background:#4c7dff;
color:white;
font-weight:bold;
cursor:pointer;
}

#stats{
margin-top:20px;
font-size:22px;
}

#log{
margin-top:15px;
background:#111;
padding:10px;
height:150px;
overflow:auto;
font-size:12px;
}
</style>
</head>

<body>

<h2>People Detection + Tracking</h2>

<div id="container">
<video id="video" width="900" height="500" autoplay muted></video>
<canvas id="canvas" width="900" height="500"></canvas>
</div>

<br>

<button onclick="startCamera()">Start Camera</button>
<button onclick="stopCamera()">Stop</button>

<div id="stats">
<div>Time: <span id="time"></span></div>
<div>People Detected: <span id="people">0</span></div>
<div>Active Tracks: <span id="tracks">0</span></div>
<div>Unique IDs Seen: <span id="unique">0</span></div>
</div>

<div id="log"></div>

<script>

const video = document.getElementById("video")
const canvas = document.getElementById("canvas")
const ctx = canvas.getContext("2d")

const peopleEl = document.getElementById("people")
const tracksEl = document.getElementById("tracks")
const uniqueEl = document.getElementById("unique")
const logEl = document.getElementById("log")

let model
let stream
let running=false

let tracks = new Map()
let uniqueIDs = new Set()
let nextID = 1

function log(msg){
const t = new Date().toISOString()
logEl.innerText = `[${t}] ${msg}\n` + logEl.innerText
}

function updateClock(){
document.getElementById("time").innerText =
new Date().toLocaleString()
}

setInterval(updateClock,500)

function iou(a,b){

const x1 = Math.max(a.x,b.x)
const y1 = Math.max(a.y,b.y)

const x2 = Math.min(a.x+a.w,b.x+b.w)
const y2 = Math.min(a.y+a.h,b.y+b.h)

const inter = Math.max(0,x2-x1)*Math.max(0,y2-y1)

const areaA = a.w*a.h
const areaB = b.w*b.h

return inter/(areaA+areaB-inter)
}

function updateTracks(detections){

let used = new Set()

for(const [id,t] of tracks){

let best=-1
let bestScore=0

detections.forEach((d,i)=>{

if(used.has(i)) return

let s=iou(t.box,d)

if(s>bestScore){
bestScore=s
best=i
}

})

if(best!=-1 && bestScore>0.2){

t.box=detections[best]
t.miss=0
used.add(best)

}else{

t.miss++

}

}

for(const [id,t] of tracks){

if(t.miss>10) tracks.delete(id)

}

detections.forEach((d,i)=>{

if(used.has(i)) return

let id=nextID++

tracks.set(id,{box:d,miss:0})
uniqueIDs.add(id)

})

}

function drawTracks(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.lineWidth=3
ctx.font="16px Arial"

for(const [id,t] of tracks){

const b=t.box

ctx.strokeStyle="#2bd576"
ctx.strokeRect(b.x,b.y,b.w,b.h)

ctx.fillStyle="black"
ctx.fillRect(b.x,b.y-20,60,20)

ctx.fillStyle="white"
ctx.fillText("ID "+id,b.x+4,b.y-5)

}

}

async function detect(){

if(!running) return

const predictions = await model.detect(video)

const people = predictions
.filter(p=>p.class==="person")
.map(p=>{

const [x,y,w,h]=p.bbox

return {x,y,w,h}

})

updateTracks(people)

drawTracks()

peopleEl.innerText = tracks.size
tracksEl.innerText = tracks.size
uniqueEl.innerText = uniqueIDs.size

setTimeout(detect,300)

}

async function startCamera(){

if(!model){

log("Loading model...")

model = await cocoSsd.load()

log("Model loaded")

}

stream = await navigator.mediaDevices.getUserMedia({video:true})

video.srcObject = stream

running=true

log("Camera started")

detect()

}

function stopCamera(){

running=false

if(stream){

stream.getTracks().forEach(t=>t.stop())

}

tracks.clear()

uniqueIDs.clear()

ctx.clearRect(0,0,canvas.width,canvas.height)

peopleEl.innerText=0
tracksEl.innerText=0
uniqueEl.innerText=0

log("Camera stopped")

}

</script>

</body>
</html>
